# =============================================================================
# bq-workflow.yaml — workflow definitions for polyconf jobs
#
# Defines how to execute every job from polyconf.yaml as a workflow.
# A single general workflow reads the BQ configs table by type and runs it.
# Cron jobs use default params; manual jobs can override via --rename-str.
# =============================================================================
# Usage:
#
#   Generate args for a workflow type:
#     ./bq-workflow.py delta2bq eng
#
#   Generate all workflow types:
#     ./bq-workflow.py all eng
#
#   Manual override via workflow (passed as JSON):
#     spark.workflow.run polyconf-bqbased-bq2bq-sync '{
#       "rename_FILTER": "WHERE lastmodifieddate >= '\''2025-01-01'\''",
#       "rename_SINCE": "2025-01-01"
#     }'
# =============================================================================

# =============================================================================
# Variable definitions (shared across workflow commands)
# Substituted by Python bq-workflow.py via Template.safe_substitute.
# =============================================================================
vars:
  all:
    YAMLPATH: scripts/bq-integration-sample
    DEFAULT_SINCE: "1970-01-01"
    DEFAULT_BQ_DATASET: events
    DEFAULT_BQ_TABLE: clean_events
    DEFAULT_PUBSUB_TOPIC: events-ingest
  eng:
  ver:
  exe:
  sand:

# =============================================================================
# Workflow definitions
# These are the types stored in the BQ configs table.
#   - description:  human-readable description shown in workflow UI
#   - command:      CliArgGenerator command producing the args string
#                   $Environment and $YAMLPATH are substituted at runtime
#
# Command format:
#   run.local Args -y $YAMLPATH/polyconf.yaml -m <job> \
#     --rename-str Env--$Environment~~VAR1--$VAR1~~VAR2--VALUE2 \
#     -f bigquery
#
#   $Environment / $VAR1 — resolved by Python script
#   Env--eng / VAR1--val — rename pairs passed to CliArgGenerator
#   ~~                    — separator between rename pairs
# =============================================================================

bq2bq-sync:
  description: >
    Sync events from source BQ table to clean table.
    Cron runs incremental. Manual override for full reindex:
      spark.workflow.run polyconf-bqbased-bq2bq-sync '{
        "rename_FILTER": "WHERE lastmodifieddate >= '\''1970-01-01'\''",
        "rename_SINCE": "1970-01-01"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m bq2bq-sync --rename-str Env--$Environment~~FILTER--"WHERE lastmodifieddate >= '$DEFAULT_SINCE'" -f bigquery

delta2bq:
  description: >
    Import Delta Lake tables to BigQuery.
    To override source path:
      spark.workflow.run polyconf-bqbased-delta2bq '{
        "rename_DELTA_PATH": "gs://custom-bucket/delta/path"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m delta2bq --rename-str Env--$Environment -f bigquery

gcs-cleanup:
  description: >
    List files on GCS.
    To change path:
      spark.workflow.run polyconf-bqbased-gcs-cleanup '{
        "rename_GCS_PATH": "gs://other-bucket/path"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m gcs-cleanup --rename-str Env--$Environment -f bigquery

full-reindex:
  description: >
    Full data reindex — no date filter, all data reprocessed.
    Triggered manually from workflow UI.
      spark.workflow.run polyconf-bqbased-full-reindex '{
        "rename_BQ_DATASET": "events",
        "rename_DST_TABLE": "clean_events"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m full-reindex --rename-str Env--$Environment -f bigquery

incremental-update:
  description: >
    Incremental update — processes only recent changes.
    Cron schedule: 0 6 * * *
    Manual override of SINCE date:
      spark.workflow.run polyconf-bqbased-incremental-update '{
        "rename_SINCE": "2025-06-01"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m incremental-update --rename-str Env--$Environment~~SINCE--$DEFAULT_SINCE -f bigquery

file-sync:
  description: >
    Copy files between GCS locations.
    To change paths:
      spark.workflow.run polyconf-bqbased-file-sync '{
        "rename_SRC_PATH": "gs://source-bucket/data",
        "rename_DST_PATH": "gs://dest-bucket/backup"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m file-sync --rename-str Env--$Environment -f bigquery

stats-collect:
  description: >
    Show row count and sample data from a BQ table.
      spark.workflow.run polyconf-bqbased-stats-collect '{
        "rename_SRC_TABLE": "raw_events"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m stats-collect --rename-str Env--$Environment -f bigquery

pubsub-publish:
  description: >
    Publish messages from GCS to a Pub/Sub topic.
      spark.workflow.run polyconf-bqbased-pubsub-publish '{
        "rename_PUBSUB_TOPIC": "events-ingest"
      }'
  command: run.local Args -y $YAMLPATH/polyconf.yaml -m pubsub-publish --rename-str Env--$Environment~~PUBSUB_TOPIC--$DEFAULT_PUBSUB_TOPIC -f bigquery

stub:
  description: stub help — placeholder for blocked jobs
  command: echo -h
